name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode debug keystore
        shell: bash
        run: |
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 --decode > "${RUNNER_TEMP}/debug.keystore"

      - name: Build release APK
        env:
          DEBUG_KEYSTORE_PATH: ${{ runner.temp }}/debug.keystore
        run: ./gradlew :app:assembleRelease

      - name: Get UNIX timestamp
        id: timestamp
        run: echo "unix_time=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.timestamp.outputs.unix_time }}
          name: ${{ steps.timestamp.outputs.unix_time }}
          files: app/build/outputs/apk/release/app-release.apk
